{{define "content"}}
<div class="comments-page">
    <h1>My Comments</h1>

    {{if .Comments}}
    <div class="comments-list">
        {{range .Comments}}
        <article class="comment" id="comment-{{.PublicID}}">
            <div class="comment-context">
                <p>On post: <a href="/posts/{{.PostPublicID}}">{{.PostTitle}}</a></p>
            </div>
            <div class="comment-header">
                <span class="comment-author">{{.AuthorUsername}}</span>
                <span class="comment-date">{{.CreatedAt.Format "Jan 02, 2006 at 3:04 PM"}}</span>
            </div>
            <div class="comment-content">
                {{.Content}}
            </div>
            <div class="comment-actions">
                <button class="btn-like-comment" data-comment-id="{{.PublicID}}">
                    👍 ({{.Likes}})
                </button>
                <button class="btn-dislike-comment" data-comment-id="{{.PublicID}}">
                    👎 ({{.Dislikes}})
                </button>
                <button class="btn-edit-comment" data-comment-id="{{.PublicID}}">Edit</button>
                <button class="btn-delete-comment" data-comment-id="{{.PublicID}}">Delete</button>
            </div>
        </article>
        {{end}}
    </div>
    {{else}}
    <p class="no-comments">You haven't made any comments yet.</p>
    {{end}}
</div>
{{end}}

{{define "scripts"}}
<script src="/static/js/post-detail.js"></script>
{{end}}
