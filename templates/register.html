{{define "content"}}
<div class="auth-container">
    <div class="auth-form">
        <h2>Register</h2>
        <form id="register-form" method="POST" action="/api/auth/register">
            <div class="form-group">
                <label for="username">Full Name:</label>
                <input type="text" id="username" name="username" placeholder="e.g., Alice or Alice Smith" required>
                <small class="form-hint">Name must start with a capital letter and contain only letters</small>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit">Register</button>

            <div id="form-errors" class="form-errors"></div>
        </form>

        <p class="auth-link">Already have an account? <a href="/login">Login here</a></p>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script src="/static/js/auth.js"></script>
{{end}}
