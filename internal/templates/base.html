<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Forum</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="/">Forum</a>
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                {{if .User}}
                    <li><a href="/post/create">Create Post</a></li>
                    <li><a href="/filter?type=created">My Posts</a></li>
                    <li><a href="/filter?type=liked">Liked Posts</a></li>
                    <li><a href="/logout">Logout ({{.User.Username}})</a></li>
                {{else}}
                    <li><a href="/login">Login</a></li>
                    <li><a href="/register">Register</a></li>
                {{end}}
            </ul>
        </nav>
    </header>

    <main>
        {{template "content" .}}
    </main>

    <footer>
        <p>&copy; 2025 Forum. All rights reserved.</p>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
