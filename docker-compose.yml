services:
  forum:
    build: .
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./data:/app/data
      - ./certs:/app/certs:ro
    environment:
      - DATABASE_PATH=/app/data/forum.db
      - SERVER_HOST=0.0.0.0
      - TLS_CERT_FILE=/app/certs/cert.pem
      - TLS_KEY_FILE=/app/certs/key.pem
    restart: unless-stopped
