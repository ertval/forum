{{define "content"}}
<div class="post-create">
    <h1>Create New Post</h1>

    <form id="post-create-form" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">Title *</label>
            <input 
                type="text" 
                id="title" 
                name="title" 
                maxlength="200" 
                required 
                placeholder="Enter post title">
            <span class="form-help">Maximum 200 characters</span>
        </div>

        <div class="form-group">
            <label for="content">Content *</label>
            <textarea
                id="content"
                name="content"
                rows="10"
                required
                placeholder="Write your post content..."></textarea>
        </div>

        <div class="form-group">
            <label>Content Preview</label>
            <div id="content-preview" class="post-detail-content" style="border: 1px solid #e0e0e0; padding: 1rem; min-height: 100px; background-color: #fafafa;"></div>
        </div>

        <div class="form-group">
            <label for="categories">Categories *</label>
            <div class="category-checkboxes">
                {{if .Categories}}
                    {{range .Categories}}
                    <label class="checkbox-label">
                        <input 
                            type="checkbox" 
                            name="categories" 
                            value="{{.Name}}">
                        {{.Name}}
                    </label>
                    {{end}}
                {{else}}
                    <p class="form-help">No categories available</p>
                {{end}}
            </div>
            <span class="form-help">Select at least one category</span>
        </div>

        <div class="form-group">
            <label for="image">Image (Optional)</label>
            <input 
                type="file" 
                id="image" 
                name="image" 
                accept="image/jpeg,image/png,image/gif">
            <span class="form-help">JPEG, PNG, or GIF. Maximum 20MB</span>
            <div id="image-preview" class="image-preview"></div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Post</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </div>

        <div id="form-errors" class="form-errors"></div>
    </form>
</div>

</div>
{{end}}

{{define "scripts"}}
<script src="/static/js/post-forms.js"></script>
{{end}}
