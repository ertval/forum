{{define "content"}}
<div class="health-status">
    <h2>System Health Status</h2>
    <p>This page shows the current status of the application's core dependencies and module API endpoints.</p>

    {{range .HealthSections}}
    <h3>{{.Title}}</h3>
    <table>
        <thead>
            <tr>
                <th>{{.ColName}}</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {{range .Rows}}
            <tr>
                <td>{{.Label}}</td>
                <td>
                    <span class="status-badge status-{{.Status}}">{{.Status}}</span>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
    {{end}}
</div>
{{end}}
