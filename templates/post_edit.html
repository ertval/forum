{{define "content"}}
<div class="post-edit">
    <h1>Edit Post</h1>

    <form id="post-edit-form" enctype="multipart/form-data" data-post-id="{{.Post.PublicID}}">
        <div class="form-group">
            <label for="title">Title *</label>
            <input 
                type="text" 
                id="title" 
                name="title" 
                maxlength="200" 
                required 
                value="{{.Post.Title}}"
                placeholder="Enter post title">
            <span class="form-help">Maximum 200 characters</span>
        </div>

        <div class="form-group">
            <label for="content">Content *</label>
            <textarea
                id="content"
                name="content"
                rows="10"
                required
                placeholder="Write your post content...">{{.Post.Content}}</textarea>
        </div>

        <div class="form-group">
            <label>Content Preview</label>
            <div id="content-preview" class="post-detail-content" style="border: 1px solid #e0e0e0; padding: 1rem; min-height: 100px; background-color: #fafafa;"></div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Post</button>
            <a href="/posts/{{.Post.PublicID}}" class="btn btn-secondary">Cancel</a>
        </div>

        <div id="form-errors" class="form-errors"></div>
    </form>
</div>
{{end}}

{{define "scripts"}}
<script src="/static/js/post-forms.js"></script>
{{end}}
