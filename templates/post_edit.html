{{define "content"}}
<div class="post-edit">
    <h1>Edit Post</h1>

    <form id="post-edit-form" enctype="multipart/form-data" data-post-id="{{.Post.ID}}">
        <div class="form-group">
            <label for="title">Title *</label>
            <input 
                type="text" 
                id="title" 
                name="title" 
                maxlength="200" 
                required 
                value="{{.Post.Title}}"
                placeholder="Enter post title">
            <span class="form-help">Maximum 200 characters</span>
        </div>

        <div class="form-group">
            <label for="content">Content *</label>
            <textarea
                id="content"
                name="content"
                rows="10"
                required
                placeholder="Write your post content...">{{.Post.Content}}</textarea>
        </div>

        <div class="form-group">
            <label>Content Preview</label>
            <div id="content-preview" class="post-detail-content" style="border: 1px solid #e0e0e0; padding: 1rem; min-height: 100px; background-color: #fafafa;"></div>
        </div>

        <div class="form-group">
            <label for="categories">Categories *</label>
            <div class="category-checkboxes">
                {{if .Categories}}
                        {{range .Categories}}
                        {{$cat := .}}
                        <label class="checkbox-label">
                            <input 
                                type="checkbox" 
                                name="categories" 
                                value="{{$cat.Name}}"
                                {{range $.Post.Categories}}{{if eq . $cat.Name}}checked{{end}}{{end}}>
                            {{$cat.Name}}
                        </label>
                        {{end}}
                {{else}}
                    <p class="form-help">No categories available</p>
                {{end}}
            </div>
            <span class="form-help">Select at least one category</span>
        </div>

        {{if .Post.ImageURL}}
        <div class="form-group">
            <label>Current Image</label>
            <div class="current-image">
                <img src="{{.Post.ImageURL}}" alt="Current image">
                <label class="checkbox-label">
                    <input type="checkbox" id="remove-image" name="remove_image">
                    Remove current image
                </label>
            </div>
        </div>
        {{end}}

        <div class="form-group">
            <label for="image">{{if .Post.ImageURL}}Replace Image{{else}}Add Image{{end}} (Optional)</label>
            <input 
                type="file" 
                id="image" 
                name="image" 
                accept="image/jpeg,image/png,image/gif">
            <span class="form-help">JPEG, PNG, or GIF. Maximum 20MB</span>
            <div id="image-preview" class="image-preview"></div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Post</button>
            <a href="/posts/{{.Post.ID}}" class="btn btn-secondary">Cancel</a>
        </div>

        <div id="form-errors" class="form-errors"></div>
    </form>
</div>

</div>
{{end}}

{{define "scripts"}}
<script src="/static/js/post-forms.js"></script>
{{end}}
